{{- if and .Values.tunnel.token (not .Values.tunnel.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "cloudflare-tunnel.fullname" . }}-token
  labels:
    {{- include "cloudflare-tunnel.labels" . | nindent 4 }}
type: Opaque
data:
  token: {{ .Values.tunnel.token | b64enc | quote }}
{{- end }}
