suite: Nebula DaemonSet tests
templates:
  - templates/nebula-daemonset.yaml
release:
  name: test-release
  namespace: default
tests:
  - it: should not render when nebula.enabled is false (default)
    asserts:
      - hasDocuments:
          count: 0

  - it: should render DaemonSet when nebula.enabled is true
    set:
      nebula.enabled: true
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: DaemonSet

  - it: should use correct default image
    set:
      nebula.enabled: true
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "ghcr.io/disentangle-network/nebula-pq:1.11.0-pq.1"

  - it: should use custom image tag
    set:
      nebula.enabled: true
      nebula.image.tag: "2.0.0"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "ghcr.io/disentangle-network/nebula-pq:2.0.0"

  - it: should use hostNetwork
    set:
      nebula.enabled: true
    asserts:
      - equal:
          path: spec.template.spec.hostNetwork
          value: true

  - it: should have NET_ADMIN capability
    set:
      nebula.enabled: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].securityContext.capabilities.add
          content: NET_ADMIN

  - it: should mount nebula config, selected-certs, and tun volumes
    set:
      nebula.enabled: true
    asserts:
      - lengthEqual:
          path: spec.template.spec.containers[0].volumeMounts
          count: 3
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: nebula-config
            mountPath: /etc/nebula
            readOnly: true
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: selected-certs
            mountPath: /etc/nebula/certs
            readOnly: true
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: tun
            mountPath: /dev/net/tun

  - it: should use custom cert secret name
    set:
      nebula.enabled: true
      nebula.certSecretName: "my-certs"
    asserts:
      - equal:
          path: spec.template.spec.volumes[1].secret.secretName
          value: "my-certs"

  - it: should use custom port
    set:
      nebula.enabled: true
      nebula.port: 5555
    asserts:
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 5555

  - it: should have correct labels including component label
    set:
      nebula.enabled: true
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/component"]
          value: nebula
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: disentangle
      - equal:
          path: metadata.labels["app.kubernetes.io/instance"]
          value: test-release
      - equal:
          path: metadata.labels["app.kubernetes.io/managed-by"]
          value: Helm
      - isNotNull:
          path: metadata.labels["helm.sh/chart"]

  # --- Init container tests ---

  - it: should have cert-selector init container
    set:
      nebula.enabled: true
    asserts:
      - lengthEqual:
          path: spec.template.spec.initContainers
          count: 1
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: cert-selector

  - it: init container should use default busybox image
    set:
      nebula.enabled: true
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].image
          value: "busybox:1.36"

  - it: init container should use custom image
    set:
      nebula.enabled: true
      nebula.initImage.repository: "alpine"
      nebula.initImage.tag: "3.19"
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].image
          value: "alpine:3.19"

  - it: init container should have NODE_NAME env from downward API
    set:
      nebula.enabled: true
    asserts:
      - contains:
          path: spec.template.spec.initContainers[0].env
          content:
            name: NODE_NAME
            valueFrom:
              fieldRef:
                fieldPath: spec.nodeName

  - it: init container should mount all-certs and selected-certs volumes
    set:
      nebula.enabled: true
    asserts:
      - lengthEqual:
          path: spec.template.spec.initContainers[0].volumeMounts
          count: 2
      - contains:
          path: spec.template.spec.initContainers[0].volumeMounts
          content:
            name: all-certs
            mountPath: /certs
            readOnly: true
      - contains:
          path: spec.template.spec.initContainers[0].volumeMounts
          content:
            name: selected-certs
            mountPath: /selected

  - it: should have all-certs volume from secret
    set:
      nebula.enabled: true
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: all-certs
            secret:
              secretName: nebula-certs

  - it: should have selected-certs emptyDir volume backed by memory
    set:
      nebula.enabled: true
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: selected-certs
            emptyDir:
              medium: Memory
              sizeLimit: 1Mi

  - it: should have four volumes total
    set:
      nebula.enabled: true
    asserts:
      - lengthEqual:
          path: spec.template.spec.volumes
          count: 4
