# Default values for disentangle.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

image:
  repository: ghcr.io/disentangle-network/disentangle-node
  tag: ""  # defaults to appVersion from Chart.yaml
  pullPolicy: IfNotPresent

# Test image (includes curl + jq; no runtime apk needed)
testImage:
  repository: ghcr.io/disentangle-network/test-tools
  tag: "latest"
  pullPolicy: IfNotPresent

# Network configuration
nodes:
  count: 5           # Number of nodes in the network
  p2pPort: 9000     # P2P communication port
  rpcPort: 8000     # HTTP RPC port

# Persistent storage for node state
persistence:
  enabled: true
  size: 1Gi
  storageClass: ""   # Use default storage class

# Resource limits and requests
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

# Service account configuration
serviceAccount:
  create: true
  name: ""

# RPC service configuration
rpcService:
  type: ClusterIP
  port: 8000

# Ingress configuration for external RPC access
ingress:
  enabled: false
  className: ""
  hosts: []
    # - host: disentangle.example.com
    #   paths:
    #     - path: /
    #       pathType: Prefix
  tls: []
    # - secretName: disentangle-tls
    #   hosts:
    #     - disentangle.example.com

# Transaction generator for testing
traffic:
  enabled: false
  interval: "*/5 * * * *"  # Cron schedule (every 5 minutes)
  txCount: 10              # Number of transactions per run

# Dashboard (future enhancement)
dashboard:
  enabled: false

# Consensus protocol parameters
consensus:
  bootstrapStart: 1000
  bootstrapEnd: 6000
  confirmationDepth: 6
  curvatureMethod: jaccard
  fixedPointScale: 65536

# Proof-of-Work parameters
pow:
  difficulty: 16
  mineIntervalSecs: 10

# Pod-level security context
podSecurityContext:
  runAsNonRoot: true
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

# Container-level security context
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: [ALL]
  readOnlyRootFilesystem: false  # needs to write state file
  runAsNonRoot: true
  runAsUser: 1000

# Nebula-PQ overlay mesh
nebula:
  enabled: false
  image:
    repository: ghcr.io/disentangle-network/nebula-pq
    tag: "1.11.0-pq.1"
    pullPolicy: IfNotPresent
  # Init container image for cert selection (busybox for sh + cp)
  initImage:
    repository: busybox
    tag: "1.36"
    pullPolicy: IfNotPresent
  resources:
    limits:
      cpu: 200m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi
  # Mode: "lighthouse" or "node"
  mode: "node"
  # Overlay network CIDR - reserved for future networkpolicy/tun configuration
  overlayCidr: "10.42.0.0/16"
  # Lighthouse address (VPN IP) - required for mode=node
  lighthouseAddr: ""
  # Port for nebula UDP traffic
  port: 4242
  # Certificate secret name (created by launch mesh add, SOPS-encrypted)
  # Expected keys: ca.crt, <nodeName>.crt, <nodeName>.key for each K8s node
  certSecretName: "nebula-certs"
  # Certificate mount mode:
  #   "shared"  - (default) init-container copies per-node certs from a single
  #               shared Secret (certSecretName) into an emptyDir. Requires pod
  #               restart to pick up rotated certs.
  #   "perNode" - each release mounts its own Secret directly at /etc/nebula/certs.
  #               Secret name = certMount.secretName or secretPrefix + fullname.
  #               Enables live cert rotation without pod restart.
  #               Designed for fleet overlay topology (one overlay identity per cluster).
  certMount:
    mode: "shared"
    # Only used when mode=perNode. Override to set the exact Secret name.
    # Expected Secret keys: ca.crt, host.crt, host.key
    secretName: ""
    # Only used when mode=perNode and secretName is empty. Prefix concatenated
    # with the Helm release fullname to derive the Secret name.
    secretPrefix: "nebula-cert-"
  # Static host map: maps VPN IPs to real addresses for lighthouse discovery
  staticHostMap: {}
    # "10.42.0.1": "lighthouse.disentangle.network:4242"
  # Lighthouse-specific settings
  lighthouse:
    # Addresses to advertise (for lighthouses behind NAT/LB)
    advertiseAddrs: []
      # - "203.0.113.1:4242"
    # Annotations for the lighthouse LoadBalancer Service
    serviceAnnotations: {}
      # oci.oraclecloud.com/load-balancer-type: nlb
  # Static map DNS re-resolution
  staticMap:
    cadence: ""   # e.g. "30s" - empty disables
    network: "ip4"
  # Relay configuration for fallback when hole punching fails
  relay:
    enabled: false       # true on lighthouse/relay nodes
    relays: []           # VPN IPs of relay nodes (for non-relay nodes)
  # Hole punching configuration
  punchy:
    punch: true
    respond: true
    delay: "1s"
    respondDelay: "5s"
  # TUN device settings
  tun:
    disabled: false      # true for lighthouse-only nodes that don't need overlay traffic
  # Firewall rules
  firewall:
    outbound:
      - port: any
        proto: any
        host: any
    inbound:
      - port: any
        proto: any
        groups:
          - disentangle

# Node scheduling
nodeSelector: {}
tolerations: []
affinity: {}

# Network policy
networkPolicy:
  enabled: false

# Pod disruption budget
podDisruptionBudget:
  enabled: true
  minAvailable: ""  # defaults to (nodes.count / 2) + 1
