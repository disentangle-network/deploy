{{- if .Values.nebula.enabled }}
{{- $certMode := .Values.nebula.certMount.mode | default "shared" }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "disentangle.fullname" . }}-nebula
  labels:
    {{- include "disentangle.labels" . | nindent 4 }}
    app.kubernetes.io/component: nebula
spec:
  selector:
    matchLabels:
      {{- include "disentangle.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: nebula
  template:
    metadata:
      labels:
        {{- include "disentangle.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: nebula
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      {{- if eq $certMode "shared" }}
      initContainers:
        - name: cert-selector
          image: "{{ .Values.nebula.initImage.repository }}:{{ .Values.nebula.initImage.tag }}"
          imagePullPolicy: {{ .Values.nebula.initImage.pullPolicy }}
          command: ['sh', '-c', 'cp /certs/${NODE_NAME}.crt /selected/host.crt && cp /certs/${NODE_NAME}.key /selected/host.key && cp /certs/ca.crt /selected/ca.crt']
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          volumeMounts:
            - name: all-certs
              mountPath: /certs
              readOnly: true
            - name: selected-certs
              mountPath: /selected
      {{- end }}
      containers:
        - name: nebula
          image: "{{ .Values.nebula.image.repository }}:{{ .Values.nebula.image.tag }}"
          imagePullPolicy: {{ .Values.nebula.image.pullPolicy }}
          {{- with .Values.nebula.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          securityContext:
            capabilities:
              add: ["NET_ADMIN"]
          ports:
            - containerPort: {{ .Values.nebula.port }}
              protocol: UDP
              name: nebula
          volumeMounts:
            - name: nebula-config
              mountPath: /etc/nebula
              readOnly: true
            - name: selected-certs
              mountPath: /etc/nebula/certs
              readOnly: true
            - name: tun
              mountPath: /dev/net/tun
          command:
            - /nebula
            - -config
            - /etc/nebula/config.yaml
      volumes:
        - name: nebula-config
          configMap:
            name: {{ include "disentangle.fullname" . }}-nebula-config
        {{- if eq $certMode "shared" }}
        - name: all-certs
          secret:
            secretName: {{ .Values.nebula.certSecretName }}
        - name: selected-certs
          emptyDir:
            medium: Memory
            sizeLimit: 1Mi
        {{- else if eq $certMode "perNode" }}
        - name: selected-certs
          secret:
            secretName: {{ .Values.nebula.certMount.secretName | default (printf "%s%s" (.Values.nebula.certMount.secretPrefix | default "nebula-cert-") (include "disentangle.fullname" .)) }}
        {{- end }}
        - name: tun
          hostPath:
            path: /dev/net/tun
            type: CharDevice
{{- end }}
