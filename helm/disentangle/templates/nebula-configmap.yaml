{{- if .Values.nebula.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "disentangle.fullname" . }}-nebula-config
  labels:
    {{- include "disentangle.labels" . | nindent 4 }}
    app.kubernetes.io/component: nebula
data:
  config.yaml: |
    pki:
      ca: /etc/nebula/certs/ca.crt
      cert: /etc/nebula/certs/host.crt
      key: /etc/nebula/certs/host.key
      curve: PQ

    {{- if .Values.nebula.staticHostMap }}
    static_host_map:
      {{- range $vpnIP, $realAddr := .Values.nebula.staticHostMap }}
      "{{ $vpnIP }}": ["{{ $realAddr }}"]
      {{- end }}
    {{- else }}
    static_host_map: {}
    {{- end }}

    {{- if eq .Values.nebula.mode "lighthouse" }}
    lighthouse:
      am_lighthouse: true
      {{- if .Values.nebula.lighthouse.advertiseAddrs }}
      advertise_addrs:
        {{- range .Values.nebula.lighthouse.advertiseAddrs }}
        - "{{ . }}"
        {{- end }}
      {{- end }}
    {{- else }}
    lighthouse:
      am_lighthouse: false
      hosts:
        - "{{ .Values.nebula.lighthouseAddr }}"
    {{- end }}

    {{- if .Values.nebula.staticMap.cadence }}
    static_map:
      cadence: {{ .Values.nebula.staticMap.cadence }}
      network: {{ .Values.nebula.staticMap.network }}
    {{- end }}

    listen:
      host: 0.0.0.0
      port: {{ .Values.nebula.port }}

    punchy:
      punch: {{ .Values.nebula.punchy.punch }}
      respond: {{ .Values.nebula.punchy.respond }}
      delay: {{ .Values.nebula.punchy.delay }}
      respond_delay: {{ .Values.nebula.punchy.respondDelay }}

    {{- if .Values.nebula.relay.enabled }}
    relay:
      am_relay: true
    {{- else if .Values.nebula.relay.relays }}
    relay:
      am_relay: false
      relays:
        {{- range .Values.nebula.relay.relays }}
        - "{{ . }}"
        {{- end }}
    {{- end }}

    tun:
      disabled: {{ .Values.nebula.tun.disabled }}
      dev: nebula1

    firewall:
      outbound:
        {{- toYaml .Values.nebula.firewall.outbound | nindent 8 }}
      inbound:
        {{- toYaml .Values.nebula.firewall.inbound | nindent 8 }}

    logging:
      level: info
{{- end }}
